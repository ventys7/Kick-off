<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kick-off Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1><span style="filter: grayscale(0); opacity: 1;">⚽</span> Kick-off Timer</h1>
        
        <div class="timers-grid">
            <!-- Serie A -->
            <div class="timer-card">
                <div class="league-header">
                    <h2>🇮🇹 Serie A</h2>
                </div>
                <div class="timer-content" id="seriea-content">
                    <div class="loading">Caricamento...</div>
                </div>
            </div>

            <!-- Premier League -->
            <div class="timer-card">
                <div class="league-header">
                    <h2>🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</h2>
                </div>
                <div class="timer-content" id="premier-content">
                    <div class="loading">Caricamento...</div>
                </div>
            </div>

            <!-- La Liga -->
            <div class="timer-card">
                <div class="league-header">
                    <h2>🇪🇸 La Liga</h2>
                </div>
                <div class="timer-content" id="laliga-content">
                    <div class="loading">Caricamento...</div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
